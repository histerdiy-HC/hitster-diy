<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HITHECTER — El Juego de Música</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <!-- Spotify iFrame API — controls the invisible player -->
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>

  <style>
    :root {
      --navy:  #04081a;
      --navy2: #080f28;
      --blue:  #0d2fff;
      --cyan:  #00e5ff;
      --cyan2: #00b8cc;
      --white: #e8f4ff;
      --fh: 'Orbitron', sans-serif;
      --fb: 'Exo 2', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: var(--fb);
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.034) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.034) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -15%; left: 50%; transform: translateX(-50%);
      width: 80vw; height: 50vh;
      background: radial-gradient(ellipse, rgba(0,80,255,.15) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      width: 100%; padding: 22px 20px 8px;
      display: flex; flex-direction: column; align-items: center;
    }
    .logo { display: flex; align-items: center; gap: 13px; }
    .logo-icon { width: 50px; height: 50px; filter: drop-shadow(0 0 10px var(--cyan)); }
    .logo-name {
      font-family: var(--fh); font-size: clamp(1.5rem,5vw,2.2rem); font-weight: 900;
      background: linear-gradient(135deg,#fff 20%,var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 14px var(--cyan));
    }
    .logo-sub {
      font-size: .6rem; letter-spacing: .28em; color: var(--cyan2);
      text-transform: uppercase; margin-top: 3px; font-weight: 700;
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px; flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 20px 48px;
    }

    /* ── Screens ── */
    .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
    .screen.active { display: flex; animation: fadeUp .45s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* ── Landing ── */
    #s-landing { gap: 24px; padding-top: 10px; }
    .hero-card {
      width: 100%;
      background: linear-gradient(145deg,rgba(0,229,255,.06),rgba(13,47,255,.1));
      border: 1px solid rgba(0,229,255,.22); border-radius: 22px;
      padding: 30px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      box-shadow: 0 0 40px rgba(0,229,255,.07), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .hero-icon { position: relative; width: 88px; height: 88px; }
    .hero-icon svg { width: 100%; height: 100%; }
    .pulse {
      position: absolute; inset: -8px;
      border: 2px solid var(--cyan); border-radius: 50%;
      opacity: 0; animation: pls 2.4s ease-out infinite;
    }
    .pulse:nth-child(2){ animation-delay:.8s; }
    .pulse:nth-child(3){ animation-delay:1.6s; }
    @keyframes pls { 0%{transform:scale(.8);opacity:.7} 100%{transform:scale(1.6);opacity:0} }
    .hero-title { font-family: var(--fh); font-size: 1.05rem; font-weight: 700; text-align: center; }
    .hero-desc  { font-size: .86rem; color: rgba(232,244,255,.55); text-align: center; line-height: 1.65; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 15px 22px;
      background: linear-gradient(135deg,var(--blue),var(--cyan));
      border: none; border-radius: 14px; color: #fff;
      font-family: var(--fh); font-size: .88rem; font-weight: 700; letter-spacing: .07em;
      cursor: pointer;
      box-shadow: 0 0 22px rgba(0,229,255,.38), 0 4px 14px rgba(0,0,0,.4);
      transition: transform .14s, box-shadow .14s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 34px rgba(0,229,255,.55),0 6px 18px rgba(0,0,0,.5); }
    .btn:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(0,229,255,.32); border-radius: 12px;
      color: var(--cyan); font-family: var(--fb); font-size: .84rem; font-weight: 600;
      padding: 12px 22px; cursor: pointer; letter-spacing: .05em;
      transition: background .18s;
    }
    .btn-ghost:hover { background: rgba(0,229,255,.07); }

    /* ── Scanner ── */
    #s-scanner { gap: 18px; padding-top: 8px; }
    .scan-hint {
      font-family: var(--fh); font-size: .8rem; letter-spacing: .2em;
      color: var(--cyan); text-transform: uppercase;
      animation: blink 1.7s ease infinite;
    }
    @keyframes blink { 50%{opacity:.35} }
    .cam-box {
      position: relative; width: 100%; max-width: 340px;
      border-radius: 20px; overflow: hidden;
      border: 2px solid rgba(0,229,255,.38);
      box-shadow: 0 0 36px rgba(0,229,255,.18);
    }
    #vid { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; background: var(--navy2); }
    .corner { position: absolute; width: 32px; height: 32px; border-color: var(--cyan); border-style: solid; box-shadow: 0 0 8px var(--cyan); }
    .corner.tl{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
    .corner.tr{top:10px;right:10px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
    .corner.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
    .corner.br{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
    .scanline {
      position: absolute; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg,transparent,var(--cyan),transparent);
      box-shadow: 0 0 8px var(--cyan);
      animation: scanln 2.2s ease-in-out infinite;
    }
    @keyframes scanln { 0%{top:15%;opacity:1}45%{top:82%;opacity:1}50%{top:82%;opacity:0}55%{top:15%;opacity:0}100%{top:15%;opacity:1} }
    #cnv { display: none; }

    /* ── Playing ── */
    #s-playing { gap: 22px; padding-top: 12px; }
    .badge {
      font-family: var(--fh); font-size: .68rem; letter-spacing: .28em;
      color: var(--cyan); background: rgba(0,229,255,.08);
      border: 1px solid rgba(0,229,255,.28); border-radius: 99px;
      padding: 6px 18px; text-transform: uppercase;
    }

    /* Disc */
    .disc-wrap {
      position: relative; width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(0,229,255,.13);
    }
    .ring:nth-child(1){ width:190px;height:190px; }
    .ring:nth-child(2){ width:212px;height:212px;border-color:rgba(0,229,255,.07); }
    .disc {
      width: 160px; height: 160px; border-radius: 50%;
      background: conic-gradient(from 0deg,#0a1535,#0d2fff 30%,#00e5ff 50%,#0a1535 70%,#081230);
      animation: spin 6s linear infinite;
      box-shadow: 0 0 40px rgba(0,229,255,.28);
    }
    .disc.paused { animation-play-state: paused; }
    .disc-inner {
      position: absolute; width: 52px; height: 52px; border-radius: 50%;
      background: var(--navy); border: 2px solid rgba(0,229,255,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; pointer-events: none;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }

    .mystery {
      font-family: var(--fh); font-size: 2rem; font-weight: 900;
      color: rgba(0,229,255,.22); letter-spacing: .35em;
    }

    /* Progress */
    .prog-wrap {
      width: 100%; height: 4px;
      background: rgba(0,229,255,.1); border-radius: 99px; overflow: hidden;
    }
    .prog-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,var(--blue),var(--cyan));
      border-radius: 99px; box-shadow: 0 0 8px var(--cyan);
      transition: width .5s linear;
    }

    /* Play button + waveforms row */
    .player-row {
      display: flex; align-items: center; justify-content: center;
      gap: 22px; width: 100%;
    }
    .play-btn {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg,var(--blue),var(--cyan));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 28px rgba(0,229,255,.55);
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .play-btn:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(0,229,255,.7); }
    .play-btn svg { width: 26px; height: 26px; }

    .waveform { display: flex; align-items: flex-end; gap: 4px; height: 36px; opacity: 0; transition: opacity .3s; }
    .waveform.on { opacity: 1; }
    .wv { width: 5px; background: linear-gradient(to top,var(--blue),var(--cyan)); border-radius: 2px 2px 0 0; box-shadow: 0 0 4px var(--cyan); animation: wvd .8s ease-in-out infinite; }
    .wv:nth-child(1){height:14px;animation-delay:0s}
    .wv:nth-child(2){height:28px;animation-delay:.11s}
    .wv:nth-child(3){height:36px;animation-delay:.22s}
    .wv:nth-child(4){height:20px;animation-delay:.08s}
    .wv:nth-child(5){height:30px;animation-delay:.17s}
    .wv:nth-child(6){height:16px;animation-delay:.26s}
    .wv:nth-child(7){height:24px;animation-delay:.14s}
    @keyframes wvd { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.25)} }

    .play-status {
      font-size: .72rem; color: rgba(232,244,255,.3);
      text-align: center; letter-spacing: .05em;
    }

    /* Reveal */
    .reveal-card {
      width: 100%;
      background: linear-gradient(145deg,rgba(0,229,255,.07),rgba(13,47,255,.09));
      border: 1px solid rgba(0,229,255,.2); border-radius: 18px;
      padding: 22px 20px; gap: 5px;
      display: none; flex-direction: column;
      animation: fadeUp .4s ease both;
    }
    .reveal-card.show { display: flex; }
    .rv-lbl  { font-size: .7rem; letter-spacing: .2em; color: var(--cyan); text-transform: uppercase; }
    .rv-song { font-family: var(--fh); font-size: 1.3rem; font-weight: 900; line-height: 1.25; }
    .rv-art  { font-size: .92rem; color: rgba(232,244,255,.6); font-weight: 600; margin-top: 2px; }
    .rv-yr   { font-size: .78rem; color: rgba(232,244,255,.32); letter-spacing: .1em; margin-top: 2px; }

    .action-row { display: flex; gap: 11px; width: 100%; }
    .action-row .btn { flex: 1; }
    .action-row .btn-ghost { flex-shrink: 0; padding: 12px 18px; }

    footer {
      position: relative; z-index: 10; padding: 14px;
      font-size: .7rem; color: rgba(232,244,255,.17);
      letter-spacing: .1em; text-align: center;
    }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: rgba(255,50,50,.12); border: 1px solid rgba(255,60,60,.38);
      color: #ff9090; font-size: .82rem; padding: 10px 20px;
      border-radius: 99px; z-index: 200; pointer-events: none;
      transition: transform .3s; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Invisible Spotify container — off-screen, still rendered */
    #sp-wrap {
      position: fixed; top: -9999px; left: -9999px;
      width: 1px; height: 1px; overflow: hidden;
    }
  </style>
</head>
<body>

<!-- ─── Invisible Spotify embed ─── -->
<div id="sp-wrap">
  <div id="sp-target"></div>
</div>

<!-- ─── Header ─── -->
<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#a0d8ff"/>
          <stop offset="100%" stop-color="#00e5ff"/>
        </linearGradient>
      </defs>
      <polygon points="50,5 61,35 92,35 68,54 77,84 50,65 23,84 32,54 8,35 39,35" fill="url(#lg)" opacity=".9"/>
      <polygon points="42,38 66,50 42,62" fill="white" opacity=".92"/>
      <text x="22" y="76" font-size="13" fill="white" opacity=".55">♪</text>
      <circle cx="14" cy="22" r="2.5" fill="#00e5ff" opacity=".8"/>
      <circle cx="84" cy="17" r="1.8" fill="#00e5ff" opacity=".6"/>
      <circle cx="89" cy="72" r="2" fill="#00e5ff" opacity=".5"/>
    </svg>
    <div>
      <div class="logo-name">HITHECTER</div>
      <div class="logo-sub">El Juego de Música</div>
    </div>
  </div>
</header>

<main>

  <!-- LANDING -->
  <div id="s-landing" class="screen active">
    <div class="hero-card">
      <div class="hero-icon">
        <div class="pulse"></div><div class="pulse"></div><div class="pulse"></div>
        <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="28" height="28" rx="3" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
          <rect x="17" y="17" width="14" height="14" rx="1" fill="#00e5ff" opacity=".7"/>
          <rect x="52" y="10" width="28" height="28" rx="3" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
          <rect x="59" y="17" width="14" height="14" rx="1" fill="#00e5ff" opacity=".7"/>
          <rect x="10" y="52" width="28" height="28" rx="3" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
          <rect x="17" y="59" width="14" height="14" rx="1" fill="#00e5ff" opacity=".7"/>
          <rect x="52" y="52" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="60" y="52" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="68" y="52" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="76" y="52" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="52" y="60" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="68" y="60" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="52" y="68" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="60" y="68" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="76" y="68" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="60" y="76" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
          <rect x="68" y="76" width="5" height="5" rx="1" fill="#00e5ff" opacity=".55"/>
        </svg>
      </div>
      <div class="hero-title">¿Adivinas la canción?</div>
      <div class="hero-desc">Escanea una tarjeta Hithecter, escucha la música sin ver el título y demuestra cuánto sabes. 🎵</div>
    </div>
    <button class="btn" id="btn-scan">📷 &nbsp; ESCANEAR TARJETA</button>
  </div>

  <!-- SCANNER -->
  <div id="s-scanner" class="screen">
    <div class="scan-hint">🎵 &nbsp; Apunta al código QR</div>
    <div class="cam-box">
      <video id="vid" playsinline autoplay muted></video>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scanline"></div>
    </div>
    <canvas id="cnv"></canvas>
    <button class="btn-ghost" id="btn-cancel">✕ &nbsp; Cancelar</button>

  <!-- PLAYING -->
  <div id="s-playing" class="screen">
    <div class="badge">🔒 CANCIÓN MISTERIOSA</div>

    <div class="disc-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="disc" id="disc"></div>
      <div class="disc-inner">🎵</div>
    </div>

    <div class="mystery">? ? ?</div>

    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>

    <div class="player-row">
      <div class="waveform" id="wv-left">
        <div class="wv"></div><div class="wv"></div><div class="wv"></div>

        <div class="wv"></div>

      <button class="play-btn" id="play-btn">

      </div>

    <div class="play-status" id="play-status">▸ Toca ▶ para escuchar</div>

    <!-- Hidden until revealed -->
    <div class="reveal-card" id="reveal-card">
      <div class="rv-lbl">🎤 Canción revelada</div>
      <div class="rv-song" id="rv-song">—</div>
      <div class="rv-art"  id="rv-art">—</div>
      <div class="rv-yr"   id="rv-yr">—</div>
    </div>

    <div class="action-row">
      <button class="btn"       id="btn-reveal">🔓 &nbsp; REVELAR CANCIÓN</button>

</main>

<footer>HITHECTER &copy; 2026 &nbsp;·&nbsp; El Juego de Música</footer>
<div id="toast"></div>

<script>
// ── helpers ──────────────────────────────────────────────
const $ = id => document.getElementById(id);
const screens = { landing: $('s-landing'), scanner: $('s-scanner'), playing: $('s-playing') };

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function showToast(msg, ms = 3200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function extractTrackId(url) {
  const m = url.match(/track\/([A-Za-z0-9]+)/);
  return m ? m[1] : null;
}

// ── Spotify iFrame API ────────────────────────────────────
let ctrl      = null;   // EmbedController
let apiReady  = false;
let pendingUri = null;  // URI queued before API initialised
let isPlaying = false;

window.onSpotifyIframeApiReady = (IFrameAPI) => {
  apiReady = true;
  const opts = { width: 0, height: 0, uri: 'spotify:track:4uLU6hMCjMI75M1A2tKUQC' };
  IFrameAPI.createController($('sp-target'), opts, (c) => {
    ctrl = c;

    c.addListener('playback_update', ({ data: d }) => {
      if (!d) return;

      // Sync progress bar
      if (d.duration > 0) {
        $('prog-bar').style.width = ((d.position / d.duration) * 100) + '%';
      }

      // Keep UI in sync with actual playback state
      const playing = !d.isPaused;
      if (playing !== isPlaying) setPlayState(playing);

      if (playing) {
        $('play-status').textContent = '🎵 Escuchando… ¿adivinas cuál es?';
      }
    });

    // Load queued track if any
    if (pendingUri) {
      c.loadUri(pendingUri);
      pendingUri = null;
    }
  });
};

function setPlayState(playing) {
  isPlaying = playing;
  $('disc').classList.toggle('paused', !playing);
  $('wv-left').classList.toggle('on', playing);
  $('wv-right').classList.toggle('on', playing);
  $('ic-play').style.display  = playing ? 'none' : '';
  $('ic-pause').style.display = playing ? ''     : 'none';
}

// ── Camera / QR ───────────────────────────────────────────
let camStream = null;
let raf       = null;

async function startScanner() {
  showScreen('scanner');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }
    });
    $('vid').srcObject = camStream;
    await $('vid').play();
    raf = requestAnimationFrame(tick);
  } catch (e) {
    showScreen('landing');
    showToast('⚠️ Sin acceso a la cámara');
  }
}

function stopScanner() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  cancelAnimationFrame(raf);
}

function tick() {
  const v = $('vid'), c = $('cnv');
  if (v.readyState >= v.HAVE_ENOUGH_DATA) {
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    const img  = ctx.getImageData(0, 0, c.width, c.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code) { handleQR(code.data); return; }
  }
  raf = requestAnimationFrame(tick);
}

// ── QR Handler ────────────────────────────────────────────
// Format: https://open.spotify.com/track/ID|Title|Artist|Year|style
function handleQR(raw) {
  stopScanner();
  if (navigator.vibrate) navigator.vibrate([70, 40, 70]);

  let trackId, title = '?', artist = '?', year = '?';

  if (raw.includes('|')) {
    const p = raw.split('|');
    trackId = extractTrackId(p[0].trim());
    title   = p[1]?.trim() || '?';
    artist  = p[2]?.trim() || '?';
    year    = p[3]?.trim() || '?';
  } else {
    trackId = extractTrackId(raw);
  }

  if (!trackId) {
    showToast('❌ QR no reconocido — usa una tarjeta Hithecter');
    setTimeout(startScanner, 1600);
    return;
  }

  // Reset UI
  $('prog-bar').style.width = '0%';
  setPlayState(false);
  $('reveal-card').classList.remove('show');
  $('btn-reveal').style.display = '';
  $('play-status').textContent = '▸ Toca ▶ para escuchar';
  $('rv-song').textContent = title;
  $('rv-art').textContent  = artist;
  $('rv-yr').textContent   = year;

  // Load into invisible player (no visual, no title visible)
  const uri = `spotify:track:${trackId}`;
  if (ctrl) {
    ctrl.loadUri(uri);  // loads, does NOT auto-play → user must press ▶
  } else {
    pendingUri = uri;   // API not ready yet, queue it
  }

  showScreen('playing');
}

// ── Play / Pause ──────────────────────────────────────────
$('play-btn').addEventListener('click', () => {
  if (!ctrl) { showToast('⏳ Cargando reproductor…'); return; }
  isPlaying ? ctrl.pause() : ctrl.resume();
});

// ── Other buttons ─────────────────────────────────────────
$('btn-scan').addEventListener('click', startScanner);

$('btn-cancel').addEventListener('click', () => { stopScanner(); showScreen('landing'); });

$('btn-reveal').addEventListener('click', () => {
  $('reveal-card').classList.add('show');
  $('btn-reveal').style.display = 'none';
});

$('btn-again').addEventListener('click', () => {
  if (ctrl) ctrl.pause();
  setPlayState(false);
  $('prog-bar').style.width = '0%';
  $('reveal-card').classList.remove('show');
  startScanner();
});
</script>
