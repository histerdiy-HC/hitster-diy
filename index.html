<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HITSTER</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ── Capas de pantalla ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.35s ease;
      background: #000;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── PANTALLA DE CARGA ── */
    #screen-loading { z-index: 10; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #222;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PANTALLA VERTICAL ── */
    #screen-portrait { z-index: 2; }

    .rotate-icon {
      font-size: 64px;
      display: block;
      animation: tilt 2s ease-in-out infinite;
    }

    @keyframes tilt {
      0%, 100% { transform: rotate(0deg); }
      40%  { transform: rotate(85deg); }
      60%  { transform: rotate(85deg); }
    }

    #screen-portrait h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-top: 28px;
      text-align: center;
    }

    #screen-portrait p {
      font-size: 15px;
      color: #666;
      margin-top: 10px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── PANTALLA HORIZONTAL ── */
    #screen-landscape {
      flex-direction: row;
      gap: 0;
      padding: 0;
      z-index: 1;
    }

    #player-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #000;
    }

    #spotify-iframe {
      width: 100%;
      max-width: 380px;
      height: 152px;
      border: none;
      border-radius: 12px;
    }

    #action-zone {
      width: 110px;
      min-width: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #0d0d0d;
      height: 100%;
      padding: 16px 8px;
      border-left: 1px solid #1a1a1a;
    }

    .btn {
      width: 100%;
      padding: 13px 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }

    .btn:active { transform: scale(0.93); }

    .btn-reveal {
      background: #FFD700;
      color: #000;
    }

    .btn-next {
      background: #1a1a1a;
      color: #999;
      border: 1px solid #2a2a2a;
    }

    /* ── PANTALLA DE REVELACIÓN (overlay encima de todo) ── */
    #screen-reveal {
      z-index: 5;
      text-align: center;
      background: #050505;
      gap: 0;
    }

    #reveal-year {
      font-size: 100px;
      font-weight: 900;
      color: #FFD700;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 60px rgba(255, 215, 0, 0.25);
    }

    #reveal-artist {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-top: 20px;
      max-width: 320px;
      line-height: 1.3;
    }

    #reveal-title {
      font-size: 17px;
      font-weight: 400;
      color: #888;
      margin-top: 8px;
      font-style: italic;
      max-width: 320px;
      line-height: 1.4;
    }

    .btn-back {
      margin-top: 36px;
      background: #1a1a1a;
      color: #999;
      border: 1px solid #2a2a2a;
      padding: 13px 30px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-back:active { opacity: 0.7; }

    /* ── PANTALLA 404 ── */
    #screen-404 {
      z-index: 10;
      text-align: center;
      gap: 14px;
    }

    #screen-404 .err-code {
      font-size: 90px;
      font-weight: 900;
      color: #e74c3c;
      line-height: 1;
    }

    #screen-404 h2 {
      font-size: 22px;
      font-weight: 700;
    }

    #screen-404 p {
      font-size: 13px;
      color: #555;
      font-family: monospace;
      background: #111;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .btn-scan {
      background: #c0392b;
      color: #fff;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.1s;
    }

    .btn-scan:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════
       PANTALLA 1 — Cargando
  ════════════════════════════════════════ -->
  <div id="screen-loading" class="screen">
    <div class="spinner"></div>
  </div>

  <!-- ════════════════════════════════════════
       PANTALLA 2 — Vertical (gira el móvil)
  ════════════════════════════════════════ -->
  <div id="screen-portrait" class="screen hidden">
    <span class="rotate-icon">📱</span>
    <h1>Gira el móvil</h1>
    <p>Pon el teléfono en <strong>horizontal</strong><br>para escuchar la canción</p>
  </div>

  <!-- ════════════════════════════════════════
       PANTALLA 3 — Horizontal (reproductor)
  ════════════════════════════════════════ -->
  <div id="screen-landscape" class="screen hidden">
    <div id="player-zone">
      <iframe
        id="spotify-iframe"
        src=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </div>
    <div id="action-zone">
      <button class="btn btn-reveal" onclick="showReveal()">Revelar</button>
      <button class="btn btn-next"   onclick="showDone()">Siguiente</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       PANTALLA 4 — Revelación (overlay)
  ════════════════════════════════════════ -->
  <div id="screen-reveal" class="screen hidden">
    <div id="reveal-year"></div>
    <div id="reveal-artist"></div>
    <div id="reveal-title"></div>
    <button class="btn-back" onclick="hideReveal()">← Escuchar de nuevo</button>
  </div>

  <!-- ════════════════════════════════════════
       PANTALLA 5 — Error 404
  ════════════════════════════════════════ -->
  <div id="screen-404" class="screen hidden">
    <div class="err-code">404</div>
    <h2>Canción no encontrada</h2>
    <p id="err-msg">ID desconocido</p>
    <button class="btn-scan" onclick="history.back()">← Escanear otra tarjeta</button>
  </div>


  <script>
    // ══════════════════════════════════════════════
    //  CONFIGURACIÓN
    //  Cambia DATA_URL si tu fichero se llama distinto
    // ══════════════════════════════════════════════
    const DATA_URL = 'canciones.json';   // ruta relativa en el mismo repo

    // ══════════════════════════════════════════════
    //  ESTADO
    // ══════════════════════════════════════════════
    let songs       = {};          // { spotifyId: { artista, cancion, año } }
    let currentSong = null;
    let isLandscape = false;
    let revealed    = false;
    let iframeSrc   = '';

    // ══════════════════════════════════════════════
    //  ARRANQUE
    // ══════════════════════════════════════════════
    async function init() {
      const params    = new URLSearchParams(window.location.search);
      const spotifyId = params.get('id');

      if (!spotifyId) {
        return show404('No se encontró ningún parámetro ?id= en la URL');
      }

      // Cargar base de datos
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        songs = await res.json();
      } catch (e) {
        return show404(`No se pudo cargar ${DATA_URL} — ${e.message}`);
      }

      // Buscar canción
      currentSong = songs[spotifyId];
      if (!currentSong) {
        return show404(`ID "${spotifyId}" no existe en canciones.json`);
      }

      // Preparar URL del iframe (autoplay + tema oscuro)
      iframeSrc = `https://open.spotify.com/embed/track/${spotifyId}?utm_source=generator&theme=0&autoplay=1`;

      // Detección de orientación
      checkOrientation();
      window.addEventListener('resize', checkOrientation);
    }

    // ══════════════════════════════════════════════
    //  ORIENTACIÓN
    // ══════════════════════════════════════════════
    function checkOrientation() {
      const nowLandscape = window.innerWidth > window.innerHeight;
      if (nowLandscape === isLandscape && !document.getElementById('screen-loading').classList.contains('hidden') === false) {
        // ya inicializado y sin cambio real → salir
      }

      const changed = (nowLandscape !== isLandscape);
      isLandscape = nowLandscape;

      const iframe = document.getElementById('spotify-iframe');

      if (nowLandscape) {
        // Reanudar iframe si estaba vaciado
        if (iframe.src !== iframeSrc) {
          iframe.src = iframeSrc;
        }
        if (!revealed) {
          showScreen('screen-landscape');
        }
      } else {
        // Pausar música vaciando el src (detiene la reproducción)
        iframe.src = '';
        if (revealed) hideReveal(true);   // cierra reveal sin volver al landscape
        showScreen('screen-portrait');
      }
    }

    // ══════════════════════════════════════════════
    //  PANTALLAS
    // ══════════════════════════════════════════════
    function showScreen(id) {
      ['screen-loading','screen-portrait','screen-landscape','screen-reveal','screen-404']
        .forEach(s => {
          document.getElementById(s).classList.toggle('hidden', s !== id);
        });
    }

    function showReveal() {
      revealed = true;
      document.getElementById('reveal-year').textContent   = currentSong.año;
      document.getElementById('reveal-artist').textContent = currentSong.artista;
      document.getElementById('reveal-title').textContent  = currentSong.cancion;
      // Solapar el reveal por encima de la pantalla landscape
      document.getElementById('screen-landscape').classList.add('hidden');
      document.getElementById('screen-reveal').classList.remove('hidden');
    }

    function hideReveal(fromPortrait = false) {
      revealed = false;
      document.getElementById('screen-reveal').classList.add('hidden');
      if (!fromPortrait && isLandscape) {
        document.getElementById('screen-landscape').classList.remove('hidden');
      } else if (!isLandscape) {
        document.getElementById('screen-portrait').classList.remove('hidden');
      }
    }

    function showDone() {
      // Cierra la pestaña o muestra mensaje de "escanea la siguiente"
      if (window.history.length > 1) {
        window.history.back();
      } else {
        showScreen('screen-portrait');
        document.getElementById('screen-portrait').querySelector('h1').textContent = '¡Bien jugado!';
        document.getElementById('screen-portrait').querySelector('p').textContent = 'Escanea la siguiente tarjeta.';
      }
    }

    function show404(msg) {
      document.getElementById('err-msg').textContent = msg;
      showScreen('screen-404');
    }

    // ══════════════════════════════════════════════
    //  GO
    // ══════════════════════════════════════════════
    init();
  </script>
</body>
</html>
